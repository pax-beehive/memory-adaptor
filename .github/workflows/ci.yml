name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Run 100-case SQLite recall baseline
        run: go run ./cmd/paxm eval run --suite evals/baseline --budget evals/baseline/budget.json
      - name: Run 50-case SQLite conversation-to-write baseline
        run: go run ./cmd/paxm eval run --suite evals/conversation-write --budget evals/conversation-write/budget.json
      - name: Run 40-case SQLite memory lifecycle baseline
        run: go run ./cmd/paxm eval run --suite evals/lifecycle --budget evals/lifecycle/budget.json
